<meta name="apple-mobile-web-app-title" content="Кашалот">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #D32F2F;
  --blue: #1565C0;
  --navy: #0d1b2a;
  --navy2: #111f30;
  --text: #ffffff;
  --dim: #94a3b8;
  --amber: #f59e0b;
  --green: #22c55e;
}

body {
  background: var(--navy);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--navy2);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
.slide-num { font-size: 13px; color: var(--dim); }
.slide-num strong { color: white; font-size: 17px; }
.timer {
  display: flex; align-items: center; gap: 8px;
  font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums;
  color: var(--green); cursor: pointer;
  padding: 7px 16px; border-radius: 10px;
  border: 2px solid rgba(34,197,94,0.3);
  user-select: none; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.timer:hover, .timer:active { background: rgba(255,255,255,0.08); }
.timer.paused { color: var(--dim); border-color: rgba(148,163,184,0.25); }
.timer.warn { color: var(--amber); border-color: rgba(245,158,11,0.35); }
.timer.danger { color: var(--red); border-color: rgba(211,47,47,0.5); animation: blink 1s ease-in-out infinite; }
.timer-icon { font-size: 14px; opacity: 0.8; }
.timer-val { letter-spacing: 0.03em; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Progress */
.progress { height: 3px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red) 0%, var(--blue) 100%);
  transition: width 0.25s ease;
}

/* Dots */
.dots {
  display: flex; gap: 5px; padding: 8px 20px;
  background: var(--navy2); flex-shrink: 0;
  justify-content: center; overflow-x: auto; scrollbar-width: none;
}
.dots::-webkit-scrollbar { display: none; }
.dot {
  width: 22px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.12); cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.dot.visited { background: rgba(255,255,255,0.3); }
.dot.active { background: var(--red); width: 34px; }
.dot:hover { background: rgba(255,255,255,0.5); }

/* Main */
.main { flex: 1; overflow: hidden; }

.slide {
  height: 100%; display: flex; flex-direction: row; gap: 0;
  animation: enter 0.18s ease;
}
@keyframes enter { from { opacity: 0.5; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.slide.red-bg  { background: rgba(211,47,47,0.04); }
.slide.blue-bg { background: rgba(21,101,192,0.04); }

/* Left: speech text */
.slide-text {
  flex: 1; min-width: 0;
  padding: 20px 24px 20px 40px;
  overflow-y: auto;
}
.slide-text::-webkit-scrollbar { width: 4px; }
.slide-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.slide-tag {
  font-size: 11px; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--red); margin-bottom: 5px;
}
.slide-title {
  font-size: 13px; color: var(--dim); font-weight: 500;
  padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 20px;
}

/* Speech text */
.speech { font-size: 24px; line-height: 1.7; }
.speech p { margin-bottom: 16px; }
.speech .big { font-size: 30px; font-weight: 700; line-height: 1.35; }
.speech .r { color: var(--red); font-weight: 600; }
.speech .b { color: #60a5fa; font-weight: 600; }
.speech .g { color: var(--green); font-weight: 600; }
.speech .dim { color: var(--dim); font-size: 19px; }
.speech strong { color: white; font-weight: 700; }

/* Interactive block */
.interact {
  background: rgba(245,158,11,0.1);
  border: 2px solid var(--amber);
  border-radius: 12px; padding: 14px 18px; margin: 14px 0;
}
.interact-label {
  font-size: 10px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--amber); margin-bottom: 10px;
}
.interact p { font-size: 22px; color: #fef3c7; line-height: 1.5; margin-bottom: 8px; }
.interact p:last-child { margin-bottom: 0; }
.interact .hl { color: var(--amber); font-weight: 700; }

/* Right: thumbnail */
.slide-thumb {
  width: 240px; flex-shrink: 0;
  padding: 20px 20px 20px 0;
  display: flex; flex-direction: column; gap: 8px;
  align-items: flex-start;
}
.thumb-img {
  width: 100%; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  position: sticky; top: 0;
}
.thumb-label {
  font-size: 11px; color: var(--dim); text-align: center; width: 100%;
}

/* Nav */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: var(--navy2);
  border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
}
.btn {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  color: white; padding: 9px 20px; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); }
.btn:disabled { opacity: 0.25; cursor: not-allowed; }
.btn.fwd { background: var(--red); border-color: transparent; }
.btn.fwd:hover:not(:disabled) { background: #b71c1c; }
.hints { font-size: 12px; color: var(--dim); text-align: center; line-height: 1.8; }
.kbd {
  display: inline-block; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 4px;
  padding: 0 5px; font-size: 11px; font-family: monospace;
}

/* Tap zone flash */
.tap-flash {
  position: fixed; top: 0; bottom: 0; width: 50%;
  pointer-events: none; opacity: 0;
  transition: opacity 0.12s ease; z-index: 999;
}
.tap-flash.left  { left: 0;  background: radial-gradient(circle at 15% 50%, rgba(255,255,255,0.1), transparent 60%); }
.tap-flash.right { right: 0; background: radial-gradient(circle at 85% 50%, rgba(255,255,255,0.1), transparent 60%); }
.tap-flash.show  { opacity: 1; }

/* ── Mobile: portrait phone ── */
@media (max-width: 640px) {
  body { height: 100dvh; }

  .topbar { padding: 8px 14px; }
  .logo { font-size: 0; }
  .logo::before { content: '🐋'; font-size: 20px; }
  .slide-num { font-size: 12px; }
  .slide-num strong { font-size: 15px; }
  .timer { font-size: 18px; padding: 5px 10px; }

  .main { overflow-y: auto; }

  .slide {
    flex-direction: column;
    height: auto;
  }

  .slide-thumb {
    width: 100%;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 10px 16px 0;
  }
  .thumb-img {
    width: 130px;
    flex-shrink: 0;
    position: static;
  }
  .thumb-label { display: none; }

  .slide-text {
    flex: none;
    width: 100%;
    padding: 12px 20px 20px;
    overflow-y: visible;
  }

  .speech { font-size: 21px; line-height: 1.6; }
  .speech .big { font-size: 26px; }
  .interact p { font-size: 19px; }

  .nav { padding: 10px 14px; }
  .btn { font-size: 14px; padding: 9px 14px; }
  .hints { font-size: 11px; }
}
</style>
</head>

let cur = 0;
let timerSec = 300;
let timerRunning = false;
let timerInterval = null;
const visited = new Set([0]);

function thumbPath(n) {
  return 'thumbs/slide-' + String(n + 1).padStart(2, '0') + '.jpg';
}

function render() {
  const s = SLIDES[cur];
  const el = document.getElementById('slide');
  el.className = 'slide ' + (s.bg || '');
  el.innerHTML = `
    <div class="slide-text">
      <div class="slide-tag">${s.tag}</div>
      <div class="slide-title">${s.title}</div>
      <div class="speech">${s.html}</div>
    </div>
    <div class="slide-thumb">
      <img class="thumb-img" src="${thumbPath(cur)}" alt="Слайд ${cur + 1}">
      <div class="thumb-label">Слайд ${cur + 1} / 20</div>
    </div>
  `;
  el.querySelector('.slide-text').scrollTop = 0;

  document.getElementById('sNum').textContent = cur + 1;
  document.getElementById('prog').style.width = ((cur + 1) / SLIDES.length * 100) + '%';
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === SLIDES.length - 1;

  const dc = document.getElementById('dots');
  dc.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : visited.has(i) ? ' visited' : '');
    d.title = `Слайд ${i+1}: ${SLIDES[i].tag}`;
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
}

function goTo(n) {
  visited.add(n);
  cur = n;
  render();
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < SLIDES.length) goTo(n);
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    updateTimer();
  } else {
    timerRunning = true;
    timerInterval = setInterval(() => {
      if (timerSec > 0) timerSec--;
      else { clearInterval(timerInterval); timerRunning = false; }
      updateTimer();
    }, 1000);
  }
}

function updateTimer() {
  const el = document.getElementById('timer');
  const icon = document.getElementById('timerIcon');
  const val = document.getElementById('timerVal');
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  val.textContent = m + ':' + String(s).padStart(2, '0');
  icon.textContent = timerRunning ? '⏸' : '▶';
  el.className = 'timer';
  if (!timerRunning && timerSec === 300) { el.classList.add('paused'); return; }
  if (timerSec <= 30) el.classList.add('danger');
  else if (timerSec <= 60) el.classList.add('warn');
}

// Touch: swipe + tap zones
let touchX = 0, touchY = 0, touchT = 0;

function showFlash(dir) {
  const el = document.getElementById(dir > 0 ? 'flashR' : 'flashL');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 180);
}

document.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
  touchT = Date.now();
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = touchX - e.changedTouches[0].clientX;
  const dy = touchY - e.changedTouches[0].clientY;
  // Swipe
  if (Math.abs(dx) > 50) { go(dx > 0 ? 1 : -1); return; }
  // Tap (quick + small movement + not on UI controls)
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15 && Date.now() - touchT < 300) {
    if (e.target.closest('.topbar, .nav, .dots, .timer, .btn')) return;
    const dir = e.changedTouches[0].clientX > window.innerWidth / 2 ? 1 : -1;
    showFlash(dir);
    go(dir);
  }
}, { passive: true });

document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown','PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
  else if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
  else if (e.key === ' ') { e.preventDefault(); toggleTimer(); }
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End') goTo(SLIDES.length - 1);
});

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
